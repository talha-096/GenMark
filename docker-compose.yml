version: '3.8'

services:
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/genmark
      - JWT_SECRET_KEY=dev-secret-key-123
    depends_on:
      - mongodb
    volumes:
      - ./Backend:/app
    networks:
      - genmark-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - genmark-network

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - genmark-network

networks:
  genmark-network:
    driver: bridge

volumes:
  mongodb_data:
